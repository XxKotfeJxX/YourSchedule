services:
  db:
    image: postgres:16-alpine
    container_name: academic_schedule_db
    environment:
      POSTGRES_DB: academic_schedule
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d academic_schedule"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: academic_schedule_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/academic_schedule
    command: python -m app.main --init-only

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: academic_schedule_tests
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/academic_schedule
      PYTEST_ARGS: ${PYTEST_ARGS:-}
    command: sh -c "python -m pytest $PYTEST_ARGS"
    profiles:
      - test

volumes:
  pg_data:
